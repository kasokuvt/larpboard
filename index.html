<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Larpboard Hot 100</title>
  <meta name="description" content="A weekly fan-run chart built from Last.fm listening activity.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>
  <div class="page-shell">
    <header class="site-header">
      <div class="brand-block">
        <div class="brand-mark" aria-label="Larpboard logo">
          <svg viewBox="0 0 120 48" role="img" aria-label="Larpboard">
            <rect x="2" y="4" width="18" height="40" fill="currentColor"></rect>
            <rect x="24" y="4" width="10" height="40" fill="currentColor"></rect>
            <rect x="38" y="4" width="10" height="40" fill="currentColor"></rect>
            <rect x="52" y="4" width="10" height="40" fill="currentColor"></rect>
            <path d="M74 4h12c15 0 26 8 26 20s-11 20-26 20H74z" fill="currentColor"></path>
          </svg>
        </div>
        <div>
          <p class="eyebrow">Weekly community chart</p>
          <h1>Larpboard Hot 100</h1>
          <p class="tagline">Streaming data comes from Larptube Discord Members! </p>
        </div>
      </div>
      <div class="header-actions">
        <label class="week-picker-label" for="week-picker">Week</label>
        <select id="week-picker" class="week-picker" aria-label="Select chart week"></select>
        <button type="button" class="theme-toggle" data-theme-toggle aria-label="Switch color mode">
          <span class="theme-toggle-inner">◐</span>
        </button>
      </div>
    </header>

    <main id="main-content" class="main-layout">
      <section class="hero-panel">
        <div>
          <p class="hero-kicker">Week of</p>
          <p id="week-of" class="hero-week">Loading…</p>
        </div>
        <div class="hero-stats" aria-label="Current chart snapshot">
          <article class="hero-stat-card">
            <span class="hero-stat-label">New songs</span>
            <strong id="stat-new-songs">—</strong>
          </article>
          <article class="hero-stat-card">
            <span class="hero-stat-label">Re-entries</span>
            <strong id="stat-re-entries">—</strong>
          </article>
          <article class="hero-stat-card">
            <span class="hero-stat-label">Carryovers</span>
            <strong id="stat-carryovers">—</strong>
          </article>
        </div>
      </section>

      <section class="chart-section">
        <div class="section-heading-row">
          <div>
            <p class="section-kicker">Current ranking</p>
            <h2>Top 100</h2>
          </div>
          <button id="back-to-chart" class="ghost-button hidden" type="button">← Back to chart</button>
        </div>
        <div id="view-root"></div>
      </section>
    </main>
  </div>

  <template id="chart-row-template">
    <article class="chart-row">
      <div class="rank-block">
        <span class="rank-number"></span>
      </div>
      <div class="cover-wrap">
        <img class="cover-image" alt="" loading="lazy" decoding="async" width="112" height="112">
      </div>
      <div class="song-main">
        <div class="movement-line"></div>
        <button type="button" class="song-title-link"></button>
        <button type="button" class="artist-link"></button>
      </div>
      <div class="song-points"></div>
      <dl class="meta-grid">
        <div><dt>LW</dt><dd class="meta-lw"></dd></div>
        <div><dt>Peak</dt><dd class="meta-peak"></dd></div>
        <div><dt>Weeks</dt><dd class="meta-weeks"></dd></div>
      </dl>
      <button type="button" class="expand-button" aria-label="Open song details">+</button>
      <div class="detail-panel hidden"></div>
    </article>
  </template>

  <script src="./app.js" defer></script>
</body>
</html>
